<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧記帳本 Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f1eb;
            --bg-secondary: #fdfaf6;
            --bg-tertiary: #fff;
            --accent-primary: #a0826d;
            --accent-secondary: #c9a88a;
            --accent-warm: #d4a574;
            --accent-green: #8b9d83;
            --accent-red: #c08681;
            --accent-blue: #7b9cb5;
            --text-primary: #4a4238;
            --text-secondary: #8b7e74;
            --border-color: #e5ddd4;
            --shadow: rgba(160, 130, 109, 0.12);
            --overlay: rgba(0, 0, 0, 0.5);
        }

        [data-theme="dark"] {
            --bg-primary: #1a1612;
            --bg-secondary: #252119;
            --bg-tertiary: #2f2920;
            --accent-primary: #d4a574;
            --accent-secondary: #c9a88a;
            --accent-warm: #e8c399;
            --accent-green: #a8c5a0;
            --accent-red: #d49992;
            --accent-blue: #9ab8d1;
            --text-primary: #e8e4de;
            --text-secondary: #b8ada1;
            --border-color: #3d362d;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* 側邊欄 */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-warm));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            text-align: center;
        }

        .nav-item {
            padding: 14px 18px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            transform: translateX(4px);
        }

        .nav-item.active {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 4px 12px var(--shadow);
        }

        .nav-icon {
            font-size: 1.3rem;
        }

        .account-selector {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
        }

        .account-btn {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .account-btn:hover {
            border-color: var(--accent-primary);
        }

        /* 主內容區 */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        .icon-btn:hover {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        /* 頁面內容 */
        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 統計卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px var(--shadow);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-warm));
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-value.income { color: var(--accent-green); }
        .stat-value.expense { color: var(--accent-red); }

        /* 圖表區 */
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* 快速記帳 */
        .quick-add {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .quick-add-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .quick-btn {
            padding: 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .quick-btn:hover {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .quick-btn-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .quick-btn-label {
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* 表單 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(160, 130, 109, 0.15);
        }

        .type-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .type-btn {
            padding: 12px;
            border: 2px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .type-btn.active.income {
            background: var(--accent-green);
            border-color: var(--accent-green);
            color: white;
        }

        .type-btn.active.expense {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: white;
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--shadow);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        /* 交易列表 */
        .transactions-table {
            background: var(--bg-secondary);
            border-radius: 14px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .table-header {
            display: grid;
            grid-template-columns: 100px 2fr 1fr 1fr 1fr 80px;
            gap: 16px;
            padding: 16px 20px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .transaction-row {
            display: grid;
            grid-template-columns: 100px 2fr 1fr 1fr 1fr 80px;
            gap: 16px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s ease;
            align-items: center;
        }

        .transaction-row:hover {
            background: var(--bg-tertiary);
        }

        .transaction-row:last-child {
            border-bottom: none;
        }

        /* 預算進度條 */
        .budget-card {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        .budget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .budget-name {
            font-weight: 600;
        }

        .budget-amount {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }

        .progress-bar {
            height: 8px;
            background: var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-warm));
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .progress-fill.warning {
            background: linear-gradient(90deg, var(--accent-warm), var(--accent-red));
        }

        .progress-fill.danger {
            background: var(--accent-red);
        }

        .budget-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 16px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .close-btn {
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            color: var(--accent-red);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-secondary);
            padding: 16px 24px;
            border-radius: 10px;
            border: 1px solid var(--accent-primary);
            box-shadow: 0 8px 24px var(--shadow);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 2000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* 搜尋欄 */
        .search-bar {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        /* 響應式 */
        @media (max-width: 968px) {
            .sidebar {
                width: 70px;
                padding: 20px 10px;
            }

            .logo {
                font-size: 1.2rem;
            }

            .nav-item span {
                display: none;
            }

            .account-selector {
                display: none;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .table-header,
            .transaction-row {
                grid-template-columns: 80px 1fr 1fr 60px;
            }

            .table-header span:nth-child(3),
            .table-header span:nth-child(4),
            .transaction-row span:nth-child(3),
            .transaction-row span:nth-child(4) {
                display: none;
            }
        }

        /* 空狀態 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        /* 標籤 */
        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .tag.income {
            background: var(--accent-green);
            color: white;
        }

        .tag.expense {
            background: var(--accent-red);
            color: white;
        }

        /* 圖片上傳 */
        .file-upload {
            border: 2px dashed var(--border-color);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-upload:hover {
            border-color: var(--accent-primary);
            background: var(--bg-tertiary);
        }

        .file-upload input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 側邊欄 -->
        <div class="sidebar">
            <div class="logo">💰 智慧記帳</div>
            
            <nav>
                <div class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span>儀表板</span>
                </div>
                <div class="nav-item" data-page="transactions">
                    <span class="nav-icon">💳</span>
                    <span>交易記錄</span>
                </div>
                <div class="nav-item" data-page="budget">
                    <span class="nav-icon">🎯</span>
                    <span>預算管理</span>
                </div>
                <div class="nav-item" data-page="analytics">
                    <span class="nav-icon">📈</span>
                    <span>數據分析</span>
                </div>
                <div class="nav-item" data-page="settings">
                    <span class="nav-icon">⚙️</span>
                    <span>設定</span>
                </div>
            </nav>

            <div class="account-selector">
                <select class="account-btn" id="accountSelect">
                    <option value="personal">個人帳本</option>
                    <option value="family">家庭帳本</option>
                    <option value="business">商務帳本</option>
                </select>
            </div>
        </div>

        <!-- 主內容 -->
        <div class="main-content">
            <!-- 儀表板頁面 -->
            <div class="page active" id="dashboard">
                <div class="header">
                    <h1 class="page-title">儀表板</h1>
                    <div class="header-actions">
                        <button class="icon-btn" id="themeToggle" title="切換主題">🌙</button>
                        <button class="icon-btn" id="exportBtn" title="匯出資料">📥</button>
                        <button class="icon-btn" id="addTransactionBtn" title="新增交易">➕</button>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">總收入</div>
                        <div class="stat-value income" id="totalIncome">NT$ 0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">總支出</div>
                        <div class="stat-value expense" id="totalExpense">NT$ 0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">淨餘額</div>
                        <div class="stat-value" id="balance">NT$ 0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">本月交易</div>
                        <div class="stat-value" id="monthlyTransactions">0 筆</div>
                    </div>
                </div>

                <div class="charts-grid">
                    <div class="chart-card">
                        <h3 class="chart-title">收支趨勢</h3>
                        <canvas id="trendChart"></canvas>
                    </div>
                    <div class="chart-card">
                        <h3 class="chart-title">支出分布</h3>
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>

                <div class="quick-add">
                    <h3 class="chart-title">快速記帳</h3>
                    <div class="quick-add-grid">
                        <div class="quick-btn" data-type="expense" data-category="餐飲" data-desc="早餐">
                            <div class="quick-btn-icon">🍳</div>
                            <div class="quick-btn-label">早餐</div>
                        </div>
                        <div class="quick-btn" data-type="expense" data-category="餐飲" data-desc="午餐">
                            <div class="quick-btn-icon">🍱</div>
                            <div class="quick-btn-label">午餐</div>
                        </div>
                        <div class="quick-btn" data-type="expense" data-category="餐飲" data-desc="晚餐">
                            <div class="quick-btn-icon">🍽️</div>
                            <div class="quick-btn-label">晚餐</div>
                        </div>
                        <div class="quick-btn" data-type="expense" data-category="交通" data-desc="交通">
                            <div class="quick-btn-icon">🚇</div>
                            <div class="quick-btn-label">交通</div>
                        </div>
                        <div class="quick-btn" data-type="expense" data-category="購物" data-desc="購物">
                            <div class="quick-btn-icon">🛍️</div>
                            <div class="quick-btn-label">購物</div>
                        </div>
                        <div class="quick-btn" data-type="income" data-category="薪資" data-desc="薪資">
                            <div class="quick-btn-icon">💰</div>
                            <div class="quick-btn-label">薪資</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 交易記錄頁面 -->
            <div class="page" id="transactions">
                <div class="header">
                    <h1 class="page-title">交易記錄</h1>
                    <div class="header-actions">
                        <button class="icon-btn" id="addTransactionBtn2">➕</button>
                    </div>
                </div>

                <div class="search-bar">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="搜尋交易...">
                </div>

                <div class="transactions-table" id="transactionsTable">
                    <!-- 動態生成 -->
                </div>
            </div>

            <!-- 預算管理頁面 -->
            <div class="page" id="budget">
                <div class="header">
                    <h1 class="page-title">預算管理</h1>
                    <div class="header-actions">
                        <button class="icon-btn" id="addBudgetBtn">➕</button>
                    </div>
                </div>

                <div id="budgetList">
                    <!-- 動態生成 -->
                </div>
            </div>

            <!-- 數據分析頁面 -->
            <div class="page" id="analytics">
                <div class="header">
                    <h1 class="page-title">數據分析</h1>
                </div>

                <div class="charts-grid" style="grid-template-columns: 1fr;">
                    <div class="chart-card">
                        <h3 class="chart-title">月度對比</h3>
                        <canvas id="monthlyComparisonChart"></canvas>
                    </div>
                    <div class="chart-card">
                        <h3 class="chart-title">分類趨勢</h3>
                        <canvas id="categoryTrendChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 設定頁面 -->
            <div class="page" id="settings">
                <div class="header">
                    <h1 class="page-title">設定</h1>
                </div>

                <div class="chart-card" style="margin-bottom: 20px;">
                    <h3 class="chart-title">外觀設定</h3>
                    <div class="form-group">
                        <label>主題模式</label>
                        <select id="themeSelect">
                            <option value="light">淺色</option>
                            <option value="dark">深色</option>
                            <option value="auto">自動</option>
                        </select>
                    </div>
                </div>

                <div class="chart-card" style="margin-bottom: 20px;">
                    <h3 class="chart-title">幣別設定</h3>
                    <div class="form-group">
                        <label>預設幣別</label>
                        <select id="currencySelect">
                            <option value="TWD">台幣 (NT$)</option>
                            <option value="USD">美金 (US$)</option>
                            <option value="JPY">日圓 (¥)</option>
                            <option value="EUR">歐元 (€)</option>
                        </select>
                    </div>
                </div>

                <div class="chart-card" style="margin-bottom: 20px;">
                    <h3 class="chart-title">資料管理</h3>
                    <div style="display: flex; gap: 12px;">
                        <button class="btn btn-primary" id="backupBtn">📦 備份資料</button>
                        <button class="btn btn-secondary" id="restoreBtn">📥 還原資料</button>
                        <button class="btn btn-secondary" id="clearBtn" style="color: var(--accent-red);">🗑️ 清除所有資料</button>
                    </div>
                </div>

                <div class="chart-card">
                    <h3 class="chart-title">Google Sheets 同步</h3>
                    <div class="form-group">
                        <label>Webhook URL</label>
                        <input type="text" id="webhookUrlInput" placeholder="貼上 Google Apps Script 網址">
                    </div>
                    <button class="btn btn-primary" id="saveWebhookBtn">儲存設定</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增交易 Modal -->
    <div class="modal" id="transactionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">新增交易</h2>
                <span class="close-btn" id="closeTransactionModal">✕</span>
            </div>
            <form id="transactionForm">
                <div class="type-selector">
                    <button type="button" class="type-btn income active" data-type="income">收入</button>
                    <button type="button" class="type-btn expense" data-type="expense">支出</button>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="description">描述 *</label>
                        <input type="text" id="description" required>
                    </div>
                    <div class="form-group">
                        <label for="amount">金額 *</label>
                        <input type="number" id="amount" min="0" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="category">分類 *</label>
                        <select id="category" required>
                            <option value="">選擇分類</option>
                            <option value="餐飲">餐飲</option>
                            <option value="交通">交通</option>
                            <option value="購物">購物</option>
                            <option value="娛樂">娛樂</option>
                            <option value="醫療">醫療</option>
                            <option value="教育">教育</option>
                            <option value="薪資">薪資</option>
                            <option value="投資">投資</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="date">日期 *</label>
                        <input type="date" id="date" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="tags">標籤 (選填)</label>
                    <input type="text" id="tags" placeholder="用逗號分隔，例如：工作,報銷">
                </div>

                <div class="form-group">
                    <label for="notes">備註 (選填)</label>
                    <textarea id="notes" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label>收據照片 (選填)</label>
                    <div class="file-upload" id="fileUpload">
                        <input type="file" id="receiptFile" accept="image/*">
                        <div>📷 點擊上傳收據照片</div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">新增交易</button>
            </form>
        </div>
    </div>

    <!-- 新增預算 Modal -->
    <div class="modal" id="budgetModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">新增預算</h2>
                <span class="close-btn" id="closeBudgetModal">✕</span>
            </div>
            <form id="budgetForm">
                <div class="form-group">
                    <label for="budgetCategory">分類 *</label>
                    <select id="budgetCategory" required>
                        <option value="">選擇分類</option>
                        <option value="餐飲">餐飲</option>
                        <option value="交通">交通</option>
                        <option value="購物">購物</option>
                        <option value="娛樂">娛樂</option>
                        <option value="醫療">醫療</option>
                        <option value="教育">教育</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="budgetAmount">預算金額 *</label>
                    <input type="number" id="budgetAmount" min="0" step="1" required>
                </div>
                <div class="form-group">
                    <label for="budgetPeriod">週期 *</label>
                    <select id="budgetPeriod" required>
                        <option value="monthly">每月</option>
                        <option value="weekly">每週</option>
                        <option value="yearly">每年</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">新增預算</button>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="expense-app.js"></script>
</body>
</html>
